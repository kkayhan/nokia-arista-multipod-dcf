! arista-leaf7 — cEOS — BD-B, MLAG pair 7/8, symmetric IRB. Area 49.0078, Loopback0 10.252.183.7, shared VTEP Loopback1 10.252.183.57
service routing protocols model multi-agent
!
hostname arista-leaf7
!
vlan 120
   name BD-B
!
vlan 4094
   name MLAG_PEER
   trunk group MLAGPEER
!
no spanning-tree vlan-id 4094
!
vrf instance tenant
!
ip routing
ip routing vrf tenant
!
ip virtual-router mac-address 00:1c:73:01:78:ff
!
interface Port-Channel1
   description MLAG_PEER_LINK
   switchport mode trunk
   switchport trunk group MLAGPEER
!
interface Port-Channel20
   description h4
   switchport access vlan 120
   mlag 20
!
interface Ethernet1
   description h4
   channel-group 20 mode active
!
interface Ethernet4
   description mlag peer-link
   channel-group 1 mode active
!
interface Ethernet5
   description mlag peer-link
   channel-group 1 mode active
!
interface Ethernet2
   description to arista-spine1
   no switchport
   mtu 9214
   ip address 10.252.183.133/31
   isis enable 1
   isis network point-to-point
!
interface Ethernet3
   description to arista-spine2
   no switchport
   mtu 9214
   ip address 10.252.183.149/31
   isis enable 1
   isis network point-to-point
!
interface Loopback0
   description RouterID
   ip address 10.252.183.7/32
   isis enable 1
   isis passive
!
interface Loopback1
   description VTEP shared 7/8
   ip address 10.252.183.57/32
   isis enable 1
   isis passive
!
interface Vlan120
   description BD-B anycast GW
   vrf tenant
   ip address virtual 10.120.0.1/24
!
interface Vlan4094
   description MLAG_PEER
   no autostate
   ip address 10.255.0.2/31
!
interface Vxlan1
   vxlan source-interface Loopback1
   vxlan virtual-router encapsulation mac-address mlag-system-id
   vxlan udp-port 4789
   vxlan vlan 120 vni 10120
   vxlan vrf tenant vni 50001
!
mlag configuration
   domain-id POD-AB-78
   local-interface Vlan4094
   peer-address 10.255.0.3
   peer-link Port-Channel1
!
router isis 1
   net 49.0078.0102.5218.3007.00
   is-type level-1-2
   log-adjacency-changes
   set-overload-bit on-startup 90
   !
   address-family ipv4 unicast
      maximum-paths 64
!
router bgp 65524
   router-id 10.252.183.7
   no bgp default ipv4-unicast
   maximum-paths 64 ecmp 64
   neighbor EVPN-RR peer group
   neighbor EVPN-RR remote-as 65524
   neighbor EVPN-RR update-source Loopback0
   neighbor EVPN-RR send-community standard extended
   neighbor 10.252.183.201 peer group EVPN-RR
   neighbor 10.252.183.202 peer group EVPN-RR
   !
   vlan 120
      rd 10.252.183.7:10120
      route-target both 65524:10120
      redistribute learned
   !
   address-family evpn
      neighbor EVPN-RR activate
   !
   vrf tenant
      rd 10.252.183.7:50001
      route-target import evpn 65524:50001
      route-target export evpn 65524:50001
      redistribute connected
!
end
