# nokia-spine2 — SR Linux — IS-IS L1L2 transit (NO BGP). Area 49.0200, router-id/system0 10.252.200.102
set / system mtu default-ip-mtu 9000
set / system mtu default-l2-mtu 9214

delete / system grpc-server eda-discovery
delete / system grpc-server eda-insecure-mgmt
delete / system grpc-server eda-mgmt

# system0 loopback (advertised in IS-IS)
set / interface system0 subinterface 0 admin-state enable
set / interface system0 subinterface 0 ipv4 admin-state enable
set / interface system0 subinterface 0 ipv4 address 10.252.200.102/32
set / bfd subinterface system0.0 admin-state enable

# fabric links to Nokia leaves e1-1..e1-4 (unnumbered, borrow system0)
set / interface ethernet-1/1 admin-state enable
set / interface ethernet-1/1 subinterface 1 admin-state enable
set / interface ethernet-1/1 subinterface 1 ipv4 admin-state enable
set / interface ethernet-1/1 subinterface 1 ipv4 unnumbered admin-state enable
set / interface ethernet-1/1 subinterface 1 ipv4 unnumbered interface system0.0
set / interface ethernet-1/2 admin-state enable
set / interface ethernet-1/2 subinterface 1 admin-state enable
set / interface ethernet-1/2 subinterface 1 ipv4 admin-state enable
set / interface ethernet-1/2 subinterface 1 ipv4 unnumbered admin-state enable
set / interface ethernet-1/2 subinterface 1 ipv4 unnumbered interface system0.0
set / interface ethernet-1/3 admin-state enable
set / interface ethernet-1/3 subinterface 1 admin-state enable
set / interface ethernet-1/3 subinterface 1 ipv4 admin-state enable
set / interface ethernet-1/3 subinterface 1 ipv4 unnumbered admin-state enable
set / interface ethernet-1/3 subinterface 1 ipv4 unnumbered interface system0.0
set / interface ethernet-1/4 admin-state enable
set / interface ethernet-1/4 subinterface 1 admin-state enable
set / interface ethernet-1/4 subinterface 1 ipv4 admin-state enable
set / interface ethernet-1/4 subinterface 1 ipv4 unnumbered admin-state enable
set / interface ethernet-1/4 subinterface 1 ipv4 unnumbered interface system0.0

# inter-pod links to Arista spines — NUMBERED /31 same-subnet as cEOS (Arista p2p IS-IS rejects subnet mismatch). e1-21->arista-spine1 .164, e1-22->arista-spine2 .166
set / interface ethernet-1/21 admin-state enable
set / interface ethernet-1/21 subinterface 1 admin-state enable
set / interface ethernet-1/21 subinterface 1 ipv4 admin-state enable
set / interface ethernet-1/21 subinterface 1 ipv4 address 10.252.183.165/31
set / interface ethernet-1/22 admin-state enable
set / interface ethernet-1/22 subinterface 1 admin-state enable
set / interface ethernet-1/22 subinterface 1 ipv4 admin-state enable
set / interface ethernet-1/22 subinterface 1 ipv4 address 10.252.183.167/31

# bind to default network-instance
set / network-instance default interface system0.0
set / network-instance default interface ethernet-1/1.1
set / network-instance default interface ethernet-1/2.1
set / network-instance default interface ethernet-1/3.1
set / network-instance default interface ethernet-1/4.1
set / network-instance default interface ethernet-1/21.1
set / network-instance default interface ethernet-1/22.1

# IS-IS — Level-1-2, flat Nokia area 49.0200
set / network-instance default protocols isis instance main admin-state enable
set / network-instance default protocols isis instance main level-capability L1L2
set / network-instance default protocols isis instance main net [ 49.0200.0102.5220.0102.00 ]
set / network-instance default protocols isis instance main ipv4-unicast admin-state enable
set / network-instance default protocols isis instance main ipv6-unicast admin-state disable
set / network-instance default protocols isis instance main overload on-boot set-bit true
set / network-instance default protocols isis instance main overload on-boot timeout 90
set / network-instance default protocols isis instance main interface system0.0 passive true
set / network-instance default protocols isis instance main interface system0.0 ipv4-unicast admin-state enable
set / network-instance default protocols isis instance main interface ethernet-1/1.1 circuit-type point-to-point
set / network-instance default protocols isis instance main interface ethernet-1/1.1 ipv4-unicast admin-state enable
set / network-instance default protocols isis instance main interface ethernet-1/2.1 circuit-type point-to-point
set / network-instance default protocols isis instance main interface ethernet-1/2.1 ipv4-unicast admin-state enable
set / network-instance default protocols isis instance main interface ethernet-1/3.1 circuit-type point-to-point
set / network-instance default protocols isis instance main interface ethernet-1/3.1 ipv4-unicast admin-state enable
set / network-instance default protocols isis instance main interface ethernet-1/4.1 circuit-type point-to-point
set / network-instance default protocols isis instance main interface ethernet-1/4.1 ipv4-unicast admin-state enable
# inter-pod IS-IS to Arista: Level-2 only, IPv4-only, hello-padding to ip-mtu (8992 <= cEOS isis-mtu 8997) for cross-vendor interop
set / network-instance default protocols isis instance main interface ethernet-1/21.1 circuit-type point-to-point
set / network-instance default protocols isis instance main interface ethernet-1/21.1 ipv4-unicast admin-state enable
set / network-instance default protocols isis instance main interface ethernet-1/21.1 ipv6-unicast admin-state disable
set / network-instance default protocols isis instance main interface ethernet-1/21.1 level 1 disable true
set / network-instance default protocols isis instance main interface ethernet-1/21.1 hello-padding loose
set / network-instance default protocols isis instance main interface ethernet-1/22.1 circuit-type point-to-point
set / network-instance default protocols isis instance main interface ethernet-1/22.1 ipv4-unicast admin-state enable
set / network-instance default protocols isis instance main interface ethernet-1/22.1 ipv6-unicast admin-state disable
set / network-instance default protocols isis instance main interface ethernet-1/22.1 level 1 disable true
set / network-instance default protocols isis instance main interface ethernet-1/22.1 hello-padding loose

# --- telemetry: syslog to promtail (172.20.20.100:1514) ---
set / system logging network-instance mgmt
set / system logging remote-server 172.20.20.100 transport udp
set / system logging remote-server 172.20.20.100 remote-port 1514
set / system logging remote-server 172.20.20.100 facility local6 priority match-above informational
