# nokia-leaf2 — SR Linux — BD-A, ESI all-active (pair with nokia-leaf1). Area 49.0200, system0/router-id/VTEP 10.252.200.2
# Pair-shared values (esi, lacp admin-key, lag system-id-mac, anycast IP/MAC, VNI/EVI/RT) are IDENTICAL to nokia-leaf1.
set / system mtu default-ip-mtu 9000
set / system mtu default-l2-mtu 9214

delete / system grpc-server eda-discovery
delete / system grpc-server eda-insecure-mgmt
delete / system grpc-server eda-mgmt

set / interface system0 subinterface 0 admin-state enable
set / interface system0 subinterface 0 ipv4 admin-state enable
set / interface system0 subinterface 0 ipv4 address 10.252.200.2/32
set / bfd subinterface system0.0 admin-state enable

set / interface ethernet-1/33 admin-state enable
set / interface ethernet-1/33 subinterface 1 admin-state enable
set / interface ethernet-1/33 subinterface 1 ipv4 admin-state enable
set / interface ethernet-1/33 subinterface 1 ipv4 unnumbered admin-state enable
set / interface ethernet-1/33 subinterface 1 ipv4 unnumbered interface system0.0
set / interface ethernet-1/34 admin-state enable
set / interface ethernet-1/34 subinterface 1 admin-state enable
set / interface ethernet-1/34 subinterface 1 ipv4 admin-state enable
set / interface ethernet-1/34 subinterface 1 ipv4 unnumbered admin-state enable
set / interface ethernet-1/34 subinterface 1 ipv4 unnumbered interface system0.0

set / network-instance default interface system0.0
set / network-instance default interface ethernet-1/33.1
set / network-instance default interface ethernet-1/34.1

set / network-instance default protocols isis instance main admin-state enable
set / network-instance default protocols isis instance main level-capability L1L2
set / network-instance default protocols isis instance main net [ 49.0200.0102.5220.0002.00 ]
set / network-instance default protocols isis instance main ipv4-unicast admin-state enable
set / network-instance default protocols isis instance main overload on-boot set-bit true
set / network-instance default protocols isis instance main overload on-boot timeout 90
set / network-instance default protocols isis instance main interface system0.0 passive true
set / network-instance default protocols isis instance main interface system0.0 ipv4-unicast admin-state enable
set / network-instance default protocols isis instance main interface ethernet-1/33.1 circuit-type point-to-point
set / network-instance default protocols isis instance main interface ethernet-1/33.1 ipv4-unicast admin-state enable
set / network-instance default protocols isis instance main interface ethernet-1/34.1 circuit-type point-to-point
set / network-instance default protocols isis instance main interface ethernet-1/34.1 ipv4-unicast admin-state enable

set / network-instance default protocols bgp autonomous-system 65524
set / network-instance default protocols bgp router-id 10.252.200.2
set / network-instance default protocols bgp route-advertisement rapid-withdrawal true
set / network-instance default protocols bgp afi-safi evpn admin-state enable
set / network-instance default protocols bgp afi-safi evpn evpn rapid-update true
set / network-instance default protocols bgp afi-safi evpn multipath ibgp maximum-paths 64
set / network-instance default protocols bgp afi-safi evpn add-paths receive true
set / network-instance default protocols bgp afi-safi evpn add-paths send true
set / network-instance default protocols bgp afi-safi evpn add-paths send-max 16
set / network-instance default protocols bgp afi-safi ipv4-unicast admin-state disable
set / network-instance default protocols bgp group evpn-rr peer-as 65524
set / network-instance default protocols bgp group evpn-rr afi-safi evpn admin-state enable
set / network-instance default protocols bgp group evpn-rr afi-safi ipv4-unicast admin-state disable
set / network-instance default protocols bgp group evpn-rr transport local-address 10.252.200.2
set / network-instance default protocols bgp group evpn-rr timers connect-retry 1
set / network-instance default protocols bgp neighbor 10.252.183.201 peer-group evpn-rr
set / network-instance default protocols bgp neighbor 10.252.183.202 peer-group evpn-rr

set / system network-instance protocols bgp-vpn bgp-instance 1
set / interface ethernet-1/1 admin-state enable
set / interface ethernet-1/1 ethernet aggregate-id lag1
set / interface lag1 admin-state enable
set / interface lag1 lag lag-type lacp
set / interface lag1 lag lacp interval FAST
set / interface lag1 lag lacp lacp-mode ACTIVE
set / interface lag1 lag lacp admin-key 110
set / interface lag1 lag lacp system-id-mac 00:00:00:00:01:10
set / interface lag1 vlan-tagging false
set / interface lag1 subinterface 1 admin-state enable
set / interface lag1 subinterface 1 type bridged
set / system network-instance protocols evpn ethernet-segments bgp-instance 1 ethernet-segment h1_esi admin-state enable
set / system network-instance protocols evpn ethernet-segments bgp-instance 1 ethernet-segment h1_esi esi 00:00:01:01:01:01:01:01:01:10
set / system network-instance protocols evpn ethernet-segments bgp-instance 1 ethernet-segment h1_esi multi-homing-mode all-active
set / system network-instance protocols evpn ethernet-segments bgp-instance 1 ethernet-segment h1_esi interface lag1

set / interface irb0 subinterface 110 admin-state enable
set / interface irb0 subinterface 110 ipv4 admin-state enable
set / interface irb0 subinterface 110 ipv4 address 10.110.0.1/24 anycast-gw true
set / interface irb0 subinterface 110 anycast-gw virtual-router-id 1
set / interface irb0 subinterface 110 anycast-gw anycast-gw-mac 00:1c:73:01:78:ff
set / interface irb0 subinterface 110 ipv4 arp learn-unsolicited true
set / interface irb0 subinterface 110 ipv4 arp evpn advertise dynamic

set / tunnel-interface vxlan0 vxlan-interface 10110 type bridged
set / tunnel-interface vxlan0 vxlan-interface 10110 ingress vni 10110
set / network-instance bd-a type mac-vrf
set / network-instance bd-a admin-state enable
set / network-instance bd-a interface lag1.1
set / network-instance bd-a interface irb0.110
set / network-instance bd-a vxlan-interface vxlan0.10110
set / network-instance bd-a protocols bgp-evpn bgp-instance 1 admin-state enable
set / network-instance bd-a protocols bgp-evpn bgp-instance 1 vxlan-interface vxlan0.10110
set / network-instance bd-a protocols bgp-evpn bgp-instance 1 evi 10110
set / network-instance bd-a protocols bgp-evpn bgp-instance 1 ecmp 8
set / network-instance bd-a protocols bgp-vpn bgp-instance 1 route-distinguisher rd 10.252.200.2:10110
set / network-instance bd-a protocols bgp-vpn bgp-instance 1 route-target export-rt target:65524:10110
set / network-instance bd-a protocols bgp-vpn bgp-instance 1 route-target import-rt target:65524:10110

set / tunnel-interface vxlan0 vxlan-interface 50001 type routed
set / tunnel-interface vxlan0 vxlan-interface 50001 ingress vni 50001
set / network-instance tenant type ip-vrf
set / network-instance tenant admin-state enable
set / network-instance tenant interface irb0.110
set / network-instance tenant vxlan-interface vxlan0.50001
set / network-instance tenant protocols bgp-evpn bgp-instance 1 admin-state enable
set / network-instance tenant protocols bgp-evpn bgp-instance 1 vxlan-interface vxlan0.50001
set / network-instance tenant protocols bgp-evpn bgp-instance 1 evi 50001
set / network-instance tenant protocols bgp-evpn bgp-instance 1 ecmp 8
set / network-instance tenant protocols bgp-vpn bgp-instance 1 route-distinguisher rd 10.252.200.2:50001
set / network-instance tenant protocols bgp-vpn bgp-instance 1 route-target export-rt target:65524:50001
set / network-instance tenant protocols bgp-vpn bgp-instance 1 route-target import-rt target:65524:50001
