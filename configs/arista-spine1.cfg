! arista-spine1 — cEOS — IS-IS L1L2 + EVPN Route-Reflector (NO VXLAN). Area 49.0078, Loopback0/RR 10.252.183.201
service routing protocols model multi-agent
!
hostname arista-spine1
!
spanning-tree mode none
!
interface Loopback0
   description RouterID + EVPN-RR
   ip address 10.252.183.201/32
   isis enable 1
   isis passive
!
! Inter-pod links to Nokia spines (Level-2 only to the Nokia area)
interface Ethernet1
   description to nokia-spine1
   no switchport
   mtu 9000
   ip address 10.252.183.160/31
   isis enable 1
   isis network point-to-point
   isis circuit-type level-2
   no isis hello padding
!
interface Ethernet2
   description to nokia-spine2
   no switchport
   mtu 9000
   ip address 10.252.183.164/31
   isis enable 1
   isis network point-to-point
   isis circuit-type level-2
   no isis hello padding
!
! Downlinks to Arista leaves (intra-pod, L1L2)
interface Ethernet3
   description to arista-leaf5
   no switchport
   mtu 9214
   ip address 10.252.183.128/31
   isis enable 1
   isis network point-to-point
!
interface Ethernet4
   description to arista-leaf6
   no switchport
   mtu 9214
   ip address 10.252.183.130/31
   isis enable 1
   isis network point-to-point
!
interface Ethernet5
   description to arista-leaf7
   no switchport
   mtu 9214
   ip address 10.252.183.132/31
   isis enable 1
   isis network point-to-point
!
interface Ethernet6
   description to arista-leaf8
   no switchport
   mtu 9214
   ip address 10.252.183.134/31
   isis enable 1
   isis network point-to-point
!
ip routing
!
router isis 1
   net 49.0078.0102.5218.3201.00
   is-type level-1-2
   log-adjacency-changes
   set-overload-bit on-startup 90
   !
   address-family ipv4 unicast
      maximum-paths 64
!
router bgp 65524
   router-id 10.252.183.201
   no bgp default ipv4-unicast
   bgp cluster-id 10.252.183.201
   maximum-paths 64 ecmp 64
   neighbor EVPN-CLIENT peer group
   neighbor EVPN-CLIENT remote-as 65524
   neighbor EVPN-CLIENT update-source Loopback0
   neighbor EVPN-CLIENT send-community standard extended
   neighbor EVPN-CLIENT route-reflector-client
   neighbor EVPN-CLIENT maximum-routes 200000
   neighbor 10.252.200.1 peer group EVPN-CLIENT
   neighbor 10.252.200.2 peer group EVPN-CLIENT
   neighbor 10.252.200.3 peer group EVPN-CLIENT
   neighbor 10.252.200.4 peer group EVPN-CLIENT
   neighbor 10.252.183.5 peer group EVPN-CLIENT
   neighbor 10.252.183.6 peer group EVPN-CLIENT
   neighbor 10.252.183.7 peer group EVPN-CLIENT
   neighbor 10.252.183.8 peer group EVPN-CLIENT
   neighbor 10.252.183.202 remote-as 65524
   neighbor 10.252.183.202 update-source Loopback0
   neighbor 10.252.183.202 send-community standard extended
   !
   address-family evpn
      neighbor EVPN-CLIENT activate
      neighbor 10.252.183.202 activate
!
!
! --- telemetry: gNMI (OpenConfig) for gnmic + RFC5424 syslog to promtail ---
username admin privilege 15 role network-admin secret admin
!
management api gnmi
   transport grpc default
!
logging format rfc5424
logging trap informational
logging host 172.20.20.100 1514 protocol udp
end
